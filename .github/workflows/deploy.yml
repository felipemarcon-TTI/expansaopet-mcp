name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --service d783fa67-bb74-4db8-be0a-4562434e3ae5
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: b8ba394d-2763-463d-9925-ef91963417ee
          RAILWAY_SERVICE_ID: d783fa67-bb74-4db8-be0a-4562434e3ae5
          RAILWAY_ENVIRONMENT_ID: 13256eda-5646-42b6-b806-f8e7ae2f37de
